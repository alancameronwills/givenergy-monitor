<!DOCTYPE html>
<html>
<!-- Pi screen 480 x 320 -->
<head>
	<meta http-equiv="refresh" content="14400">
	<meta name="viewport"
		content="width=device-width, user-scalable=no, minimum-scale=1, maximum-scale=1,initial-scale=1" />
	<meta http-equiv='Content-Type' content='text/html; charset=utf-8' />
	<title>Pantywylan</title>
	<script src="weather.js?v=3"></script>
	<script>
		function start() {
			refresh();
			setInterval(() => {
				refresh();
			}, 60000);
			showWeather("weather", "daychart");
		}
		var previousSum = 0;
		var minuteCount = 0;
		var timeWentBust = null;
		var bust = 0;
		async function refresh() {
			let sum = 0;
			try {
				const m = await import ('/givenergy.js');
				const d = await m.getPowerData();
				const state = {
					s1: d.pv1_power_W,
					s2: d.pv2_power_W,
					bDrain: Math.max(0,d.battery_power_W),
					bCharge: -Math.min(0,d.battery_power_W),
					gImport: -Math.min(0,d.grid_power_W),
					gExport: Math.max(0,d.grid_power_W),
					load: d.load_power_W,
					bFill: d.battery_soc_percent
				};
				//const state = await (await fetch("https://pv-fudge.azurewebsites.net/api/state")).json();
				
				const sumIn = state.s1 + state.s2 + state.bDrain + state.gImport;
				const sumOut = state.gExport + state.load + state.bCharge;
				setHeight("i-s1", state.s1);
				setHeight("i-s2", state.s2);
				setHeight("i-b", state.bDrain);
				setHeight("i-g", state.gImport, sumIn);
				setHeight("o-g", state.gExport);
				setHeight("o-b", state.bCharge);
				setHeight("o-l", state.load, sumOut);
				setWidth("bFill", state.bFill + 1);
				sum = state.s1 + state.s2 + state.bDrain + state.gImport + state.gExport + state.bCharge + state.load + state.bFill;
				bust = 0;
				timeWentBust = null;
			} catch {
				bust++;
				if (!timeWentBust) {
					timeWentBust = new Date();
				}
			}
			if (bust>3) {
				document.body.classList.add("unavailable");
				document.querySelector("#bustMsg").innerHTML = timeWentBust.toTimeString().substr(0, 8);
			} else if (!bust) {
				document.body.classList.remove("unavailable");
			}
			if (sum != previousSum) {
				minuteCount = 0;
				previousSum = sum;
			}
			document.getElementById("minutes").innerHTML = minuteCount || "";
		}
		function setHeight(id, watts, max) {
			const restricted = max ? watts - Math.max(0, max - 6100) : watts;
			const segment = document.getElementById(id);
			segment.style.height = `${restricted * 16 / 1000}%`;
			segment.innerHTML = watts < 500 ? "" : "" + watts;
		}
		function setWidth(id, percent) {
			const segment = document.getElementById(id);
			segment.style.width = `${percent}%`;
		}
		function setFlag(id, on = true) {
			const segment = document.getElementById(id);
			if (on) segment.classList.add("flag");
			else segment.classList.remove("flag");
		}
		function fullscreen() {
			if (document.fullscreenElement)
				document.location.reload();
			else
				document.body.requestFullscreen();
		}
	</script>
	<style>
		body {
			background: #000;
			cursor: none;
			color: white;
		}

		#pv {
			position: absolute;
			top: 0;
			bottom: 0;
			right: 5vw;
			width: 22vw;
			font-family: sans-serif;
			font-size: 5vh;
		}

		#mask {
			position: absolute;
			top: 0;
			bottom: 10%;
			left: 0;
			right: 0;
			background-color: #000;
			opacity: 0;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			z-index: 1;
		}

		#mask>img {
			max-height: 100%;
			max-width: 100%;
		}

		.unavailable #mask {
			opacity: 0.9;
		}

		#bottom {
			position: absolute;
			bottom: 2%;
			left: 0;
			right: 0;
			height: 5vh;
		}

		.creditDebit {
			position: absolute;
			top: 10%;
			right: 0;
			left: 0%;
			bottom: 10%;
			display: flex;
			justify-content: space-between;
		}

		.creditDebit>div {
			width: 35%;
			display: flex;
			flex-direction: column;
			justify-content: flex-end;
			align-items: center;
			background-color: rgb(30, 30, 30);
		}

		#scale {
			width: 10%;
		}

		#scale>div {
			height: 16%;
			width: 100%;
			border-top: 1px solid white;
			font-size: 5vh;
			font-family: sans-serif;
			text-align: center;
			color: white;
		}

		.segment {
			width: 100%;
			height: 10%;
			text-align: center;
		}

		.flag {
			outline: red 1px solid;
		}

		.hsegment {
			width: 20%;
			height: 100%;
			text-align: center;
		}

		#i-g {
			background-color: red;
		}

		#o-g {
			background-color: darkred;
		}

		#i-b {
			background-color: rgb(53 197 243);
		}

		#o-b {
			background-color: rgb(58 122 197);
		}

		#i-s1 {
			background-color: yellow;
		}

		#i-s2 {
			background-color: rgb(255, 232, 0);
		}

		#o-l {
			background-color: rgb(0 151 0);
		}

		#bFill {
			background-color: aqua;
		}

		#minutes {
			position: absolute;
			bottom: 2%;
			right: 10%;
		}

		#weather {
			position: fixed;
			left: 2vw;
			right: 0;
			bottom: 2vh;
		}
		#daychart {
			position: fixed;
			left: 2vw;
			width: 300px;
			top: 2vh;
		}

		center {
			display: none;
		}
	</style>
</head>
